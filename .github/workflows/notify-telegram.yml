name: Notify Telegram (Reusable)

on:
  workflow_call:
    inputs:
      topic_id:
        required: true
        type: string
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ inputs.topic_id }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ "$EVENT_NAME" = "issues" ]; then
            case "$EVENT_ACTION" in
              opened)   HEADER="[NEW] New Issue"; URL="$ISSUE_URL"; TITLE="$ISSUE_TITLE" ;;
              closed)   HEADER="[CLOSED] Issue Closed"; URL="$ISSUE_URL"; TITLE="$ISSUE_TITLE" ;;
              reopened) HEADER="[REOPEN] Issue Reopened"; URL="$ISSUE_URL"; TITLE="$ISSUE_TITLE" ;;
              *)        exit 0 ;;
            esac
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            case "$EVENT_ACTION" in
              opened)           HEADER="[PR] New PR"; URL="$PR_URL"; TITLE="$PR_TITLE" ;;
              ready_for_review) HEADER="[REVIEW] PR Ready"; URL="$PR_URL"; TITLE="$PR_TITLE" ;;
              closed)
                if [ "$PR_MERGED" = "true" ]; then
                  HEADER="[MERGED] PR Merged"
                else
                  HEADER="[CLOSED] PR Closed"
                fi
                URL="$PR_URL"; TITLE="$PR_TITLE" ;;
              *) exit 0 ;;
            esac
          else
            exit 0
          fi

          SAFE_TITLE=$(echo "$TITLE" | sed 's/&/\&amp;/g;s/</\&lt;/g;s/>/\&gt;/g;s/#//g')
          TEXT=$(printf '<b>%s</b>\n<a href="%s">%s</a>\n<code>%s</code>' "$HEADER" "$URL" "$SAFE_TITLE" "$REPO_NAME")

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"message_thread_id\":${TOPIC_ID},\"text\":$(echo "$TEXT" | jq -Rs .),\"parse_mode\":\"HTML\",\"disable_web_page_preview\":true}"
